<!DOCTYPE html>
<html>
<head>
<title>Breast Cancer Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"></head>

<body>

<div class="container">

<h1>Breast Cancer Prediction System</h1>
<p class="subtitle">Enter tumor measurements to predict cancer risk</p>

<form id="predictionForm">

<div class="grid">

<input type="number" step="any" placeholder="Radius Mean" required>
<input type="number" step="any" placeholder="Texture Mean" required>
<input type="number" step="any" placeholder="Perimeter Mean" required>
<input type="number" step="any" placeholder="Area Mean" required>
<input type="number" step="any" placeholder="Smoothness Mean" required>
<input type="number" step="any" placeholder="Compactness Mean" required>
<input type="number" step="any" placeholder="Concavity Mean" required>
<input type="number" step="any" placeholder="Concave Points Mean" required>
<input type="number" step="any" placeholder="Symmetry Mean" required>
<input type="number" step="any" placeholder="Fractal Dimension Mean" required>

</div>

<button type="button" onclick="predict()">Predict Result</button>

</form>

</div>

<script>
function predict() {

    let inputs = document.querySelectorAll("#predictionForm input");
    let features = [];

    inputs.forEach(input => {
        features.push(parseFloat(input.value));
    });

    fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({features: features})
    })
    .then(res => res.json())
    .then(data => {

        // Save result
        localStorage.setItem("prediction", data.prediction);

        // Redirect to result page
        window.location.href = "/result";
    });
}
</script>

</body>
</html>
